<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rachele Tools</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <script src="taskpane.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f8f9fa;
      color: #212529;
      padding: 16px;
    }

    /* ── DIALOG OVERLAY ── */
    #setupOverlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }
    #setupOverlay.open { display: flex; }

    #setupDialog {
      background: white;
      border-radius: 12px;
      padding: 24px;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }

    #setupDialog h2 {
      font-size: 18px;
      font-weight: 700;
      color: #4F46E5;
      margin-bottom: 20px;
      text-align: center;
    }

    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #6c757d;
      margin-bottom: 6px;
    }
    .form-group input {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid #e0e7ff;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
    }
    .form-group input:focus {
      outline: none;
      border-color: #6366f1;
    }

    .cover-section {
      margin-bottom: 20px;
    }
    .cover-section label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #6c757d;
      margin-bottom: 10px;
    }
    .cover-options {
      display: flex;
      gap: 16px;
      justify-content: center;
    }
    .cover-item {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .cover-thumb {
      width: 80px;
      height: 100px;
      border: 2px solid #e0e7ff;
      border-radius: 8px;
      cursor: pointer;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s, transform 0.2s;
    }
    .cover-thumb:hover {
      border-color: #6366f1;
      transform: scale(1.05);
    }
    .cover-thumb.selected {
      border-color: #4F46E5;
      box-shadow: 0 0 0 2px #4F46E5;
    }
    .cover-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .cover-thumb.no-cover {
      background: white;
    }
    .cover-thumb.placeholder {
      background: #f0f0f0;
      font-size: 10px;
      color: #9ca3af;
      text-align: center;
    }
    .cover-label {
      margin-top: 6px;
      font-size: 11px;
      color: #6c757d;
    }

    #userImageSection {
      display: none;
      margin-top: 12px;
      padding: 12px;
      background: #f8f9fa;
      border-radius: 8px;
      text-align: center;
    }
    #userImageSection label {
      display: block;
      font-size: 12px;
      color: #6c757d;
      margin-bottom: 8px;
    }
    #userImageSection input {
      font-size: 12px;
    }

    .dialog-buttons {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }
    .dialog-buttons button {
      flex: 1;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    #btnNoCover {
      background: white;
      border: 1.5px solid #e0e7ff;
      color: #6c757d;
    }
    #btnNoCover:hover { background: #f8f9fa; }
    #btnCreateCover {
      background: #4F46E5;
      border: none;
      color: white;
    }
    #btnCreateCover:hover { background: #4338ca; }
    #btnCreateCover:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }

    /* ── MAIN CONTENT ── */
    #mainContent { display: none; }
    #mainContent.open { display: block; }

    h2 {
      font-size: 16px;
      font-weight: 700;
      color: #4F46E5;
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 2px solid #e0e7ff;
    }
    .section-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #6c757d;
      margin: 18px 0 8px;
    }
    .menu-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 12px 14px;
      margin-bottom: 8px;
      border: 1.5px solid #e0e7ff;
      border-radius: 8px;
      background: white;
      color: #374151;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      text-align: left;
      transition: background 0.15s, border-color 0.15s;
    }
    .menu-btn:hover { background: #eef2ff; border-color: #6366f1; color: #4F46E5; }
    .menu-btn .preview {
      display: block;
      font-weight: 400;
      font-size: 11px;
      color: #9ca3af;
      margin-top: 2px;
    }
    .divider { border: none; border-top: 1px solid #e9ecef; margin: 16px 0; }
    #status {
      font-size: 12px;
      color: #6366f1;
      margin-top: 12px;
      min-height: 18px;
      text-align: center;
    }
  </style>
</head>
<body>

  <!-- ── SETUP DIALOG ── -->
  <div id="setupOverlay">
    <div id="setupDialog">
      <h2>Cover Page Setup</h2>

      <div class="form-group">
        <label>Title</label>
        <input type="text" id="inputTitle" placeholder="Enter title..." />
      </div>

      <div class="form-group">
        <label>Subtitle</label>
        <input type="text" id="inputSubtitle" placeholder="Enter subtitle..." />
      </div>

      <div class="form-group">
        <label>Date</label>
        <input type="text" id="inputDate" placeholder="Enter date..." />
      </div>

      <div class="cover-section">
        <label>Select Cover</label>
        <div class="cover-options">
          <div class="cover-item">
            <div class="cover-thumb" data-cover="1" onclick="selectCover(1)">
              <img src="assets/cover1.png" alt="Cover 1" />
            </div>
            <span class="cover-label">Cover 1</span>
          </div>
          <div class="cover-item">
            <div class="cover-thumb no-cover selected" data-cover="0" onclick="selectCover(0)">
              <span style="font-size: 12px; color: #9ca3af;">No Cover</span>
            </div>
            <span class="cover-label">No Cover</span>
          </div>
        </div>
      </div>

      <div class="dialog-buttons">
        <button id="btnOk" onclick="handleOk()">OK</button>
      </div>
    </div>
  </div>

  <!-- ── MAIN CONTENT ── -->
  <div id="mainContent">
    <h2>Rachele Tools</h2>
    <button class="menu-btn" onclick="resetSetup()" style="margin-bottom: 16px; background: #fff3cd; border-color: #ffc107;">
      Reset Cover Setup
    </button>

    <div class="section-title">Cover</div>
    <button class="menu-btn" onclick="addImageToCover()">
      Add Image <span class="preview">Add your photo to the cover</span>
    </button>
    <input type="file" id="coverImageInput" accept="image/*" style="display: none;" onchange="handleCoverImageUpload(this)" />

    <div class="section-title">Headings</div>
    <button class="menu-btn" onclick="applyStyle('Heading 1')">Heading 1</button>
    <button class="menu-btn" onclick="applyStyle('Heading 2')">Heading 2</button>
    <button class="menu-btn" onclick="applyStyle('Heading 3')">Heading 3</button>
    <button class="menu-btn" onclick="applyStyle('Normal')">Body Text</button>

    <hr class="divider" />

    <div class="section-title">Insert</div>
    <button class="menu-btn" onclick="insertLandscapePage()">
      Landscape Page <span class="preview">Insert landscape-oriented page</span>
    </button>

    <hr class="divider" />

    <div class="section-title">Tables</div>
    <button class="menu-btn" onclick="insertTable()">
      Insert Table <span class="preview">Insert 4x3 formatted table</span>
    </button>

    <p id="status"></p>
  </div>

</body>
</html>
