<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rachele Tools</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <script src="taskpane.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f8f9fa;
      color: #212529;
      padding: 0;
    }

    /* ── TABS ── */
    .tab-container {
      display: flex;
      background: #e9ecef;
      border-bottom: 2px solid #dee2e6;
    }
    .tab-btn {
      flex: 1;
      padding: 12px 8px;
      border: none;
      background: transparent;
      color: #6c757d;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab-btn:hover {
      background: #dee2e6;
    }
    .tab-btn.active {
      background: white;
      color: #4F46E5;
      border-bottom: 2px solid #4F46E5;
    }

    /* ── TAB CONTENT ── */
    .tab-content {
      display: none;
      padding: 16px;
    }
    .tab-content.active {
      display: block;
    }

    /* ── DIALOG OVERLAY ── */
    #setupOverlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }
    #setupOverlay.open { display: flex; }

    #setupDialog {
      background: white;
      border-radius: 12px;
      padding: 24px;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }

    #setupDialog h2 {
      font-size: 18px;
      font-weight: 700;
      color: #4F46E5;
      margin-bottom: 20px;
      text-align: center;
    }

    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #6c757d;
      margin-bottom: 6px;
    }
    .form-group input {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid #e0e7ff;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
    }
    .form-group input:focus {
      outline: none;
      border-color: #6366f1;
    }

    .cover-section {
      margin-bottom: 20px;
    }
    .cover-options {
      display: flex;
      gap: 16px;
      justify-content: center;
    }
    .cover-item {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .cover-thumb {
      width: 80px;
      height: 100px;
      border: 2px solid #e0e7ff;
      border-radius: 8px;
      cursor: pointer;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s, transform 0.2s;
    }
    .cover-thumb:hover {
      border-color: #6366f1;
      transform: scale(1.05);
    }
    .cover-thumb.selected {
      border-color: #4F46E5;
      box-shadow: 0 0 0 2px #4F46E5;
    }
    .cover-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .cover-thumb.no-cover {
      background: white;
    }
    .cover-label {
      margin-top: 6px;
      font-size: 11px;
      color: #6c757d;
    }

    .dialog-buttons {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }
    .dialog-buttons button {
      flex: 1;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    #btnOk {
      background: #4F46E5;
      border: none;
      color: white;
    }
    #btnOk:hover { background: #4338ca; }

    /* ── STYLE BUTTONS ── */
    .section-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #6c757d;
      margin: 16px 0 8px;
    }
    .menu-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 12px 14px;
      margin-bottom: 8px;
      border: 1.5px solid #e0e7ff;
      border-radius: 8px;
      background: white;
      color: #374151;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      text-align: left;
      transition: background 0.15s, border-color 0.15s;
    }
    .menu-btn:hover { background: #eef2ff; border-color: #6366f1; color: #4F46E5; }
    .menu-btn .preview {
      display: block;
      font-weight: 400;
      font-size: 11px;
      color: #9ca3af;
      margin-top: 2px;
    }
    .menu-btn.selected {
      background: #eef2ff;
      border-color: #4F46E5;
      color: #4F46E5;
    }
    .divider { border: none; border-top: 1px solid #e9ecef; margin: 16px 0; }

    /* ── TABLE INPUTS ── */
    .input-row {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
    }
    .input-group {
      flex: 1;
    }
    .input-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #6c757d;
      margin-bottom: 6px;
    }
    .input-group input,
    .input-group select {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid #e0e7ff;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      background: white;
    }
    .input-group input:focus,
    .input-group select:focus {
      outline: none;
      border-color: #6366f1;
    }

    /* ── STATUS ── */
    #status {
      font-size: 12px;
      color: #6366f1;
      margin-top: 12px;
      min-height: 18px;
      text-align: center;
    }
  </style>
</head>
<body>

  <!-- ── SETUP DIALOG ── -->
  <div id="setupOverlay">
    <div id="setupDialog">
      <h2>Cover Page Setup</h2>

      <div class="form-group">
        <label>Title</label>
        <input type="text" id="inputTitle" placeholder="Enter title..." />
      </div>

      <div class="form-group">
        <label>Subtitle</label>
        <input type="text" id="inputSubtitle" placeholder="Enter subtitle..." />
      </div>

      <div class="form-group">
        <label>Date</label>
        <input type="text" id="inputDate" placeholder="Enter date..." />
      </div>

      <div class="cover-section">
        <label>Select Cover</label>
        <div class="cover-options">
          <div class="cover-item">
            <div class="cover-thumb" data-cover="1" onclick="selectCover(1)">
              <img src="assets/cover1.png" alt="Cover 1" />
            </div>
            <span class="cover-label">Cover 1</span>
          </div>
          <div class="cover-item">
            <div class="cover-thumb no-cover selected" data-cover="0" onclick="selectCover(0)">
              <span style="font-size: 12px; color: #9ca3af;">No Cover</span>
            </div>
            <span class="cover-label">No Cover</span>
          </div>
        </div>
      </div>

      <div class="dialog-buttons">
        <button id="btnOk" onclick="handleOk()">OK</button>
      </div>
    </div>
  </div>

  <!-- ── TABS ── -->
  <div class="tab-container">
    <button class="tab-btn active" data-tab="cover">Cover</button>
    <button class="tab-btn" data-tab="styles">Styles</button>
    <button class="tab-btn" data-tab="tables">Tables</button>
    <button class="tab-btn" data-tab="layouts">Layouts</button>
  </div>

  <!-- ── TAB COVER ── -->
  <div id="tab-cover" class="tab-content active">
    <h2>Cover Page Setup</h2>
    <button class="menu-btn" onclick="resetSetup()" style="margin: 16px 0; background: #fff3cd; border-color: #ffc107;">
      Reset Cover Setup
    </button>
    <p style="color: #6c757d; font-size: 12px;">Click "Reset Cover Setup" to create a new cover page.</p>
  </div>

  <!-- ── TAB STYLES ── -->
  <div id="tab-styles" class="tab-content">
    <div class="section-title">Headings</div>
    <button class="menu-btn" onclick="applyStyle('Heading 1')">Heading 1</button>
    <button class="menu-btn" onclick="applyStyle('Heading 2')">Heading 2</button>
    <button class="menu-btn" onclick="applyStyle('Heading 3')">Heading 3</button>

    <div class="section-title">Body</div>
    <button class="menu-btn" onclick="applyStyle('Normal')">Body Text</button>

    <div class="section-title">Bullets</div>
    <button class="menu-btn" onclick="applyStyle('List Bullet')">Bullet 1</button>
    <button class="menu-btn" onclick="applyStyle('List Bullet 2')">Bullet 2</button>
    <button class="menu-btn" onclick="applyStyle('List Bullet 3')">Bullet 3</button>

    <div class="section-title">Numbering</div>
    <button class="menu-btn" onclick="applyStyle('List Number')">Number 1</button>
    <button class="menu-btn" onclick="applyStyle('List Number 2')">Number 2</button>
    <button class="menu-btn" onclick="applyStyle('List Number 3')">Number 3</button>
  </div>

  <!-- ── TAB TABLES ── -->
  <div id="tab-tables" class="tab-content">
    <div class="section-title">Insert Table</div>

    <div class="input-row">
      <div class="input-group">
        <label>Rows</label>
        <input type="number" id="inputRows" value="4" min="1" max="20" />
      </div>
      <div class="input-group">
        <label>Columns</label>
        <input type="number" id="inputColumns" value="3" min="1" max="10" />
      </div>
    </div>

    <div class="section-title">Header Style</div>
    <button class="menu-btn table-style-btn selected" data-table-style="heading" onclick="selectTableStyle('heading')">Table Heading</button>
    <button class="menu-btn table-style-btn" data-table-style="text" onclick="selectTableStyle('text')">Table Text</button>
    <button class="menu-btn table-style-btn" data-table-style="bullets" onclick="selectTableStyle('bullets')">Table Bullets</button>
    <button class="menu-btn table-style-btn" data-table-style="none" onclick="selectTableStyle('none')">None</button>

    <hr class="divider" />

    <button class="menu-btn" onclick="insertCustomTable()" style="background: #4F46E5; color: white; border-color: #4F46E5;">
      Insert Table
    </button>
  </div>

  <!-- ── TAB LAYOUTS ── -->
  <div id="tab-layouts" class="tab-content">
    <div class="section-title">A4 Sizes</div>
    <button class="menu-btn" onclick="insertPage('landscape')">Insert Landscape Page</button>
    <button class="menu-btn" onclick="insertPage('portrait')">Insert Portrait Page</button>

    <div class="section-title">A3 Sizes</div>
    <button class="menu-btn" onclick="insertPage('a3-landscape')">Insert A3 Landscape</button>
    <button class="menu-btn" onclick="insertPage('a3-portrait')">Insert A3 Portrait</button>
  </div>

  <p id="status"></p>

</body>
</html>
