<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rachele Tools</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <script src="taskpane.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f8f9fa;
      color: #212529;
      padding: 16px;
    }
    h2 {
      font-size: 16px;
      font-weight: 700;
      color: #4F46E5;
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 2px solid #e0e7ff;
    }
    .section-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #6c757d;
      margin: 18px 0 8px;
    }
    .menu-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 12px 14px;
      margin-bottom: 8px;
      border: 1.5px solid #e0e7ff;
      border-radius: 8px;
      background: white;
      color: #374151;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      text-align: left;
      transition: background 0.15s, border-color 0.15s;
    }
    .menu-btn:hover { background: #eef2ff; border-color: #6366f1; color: #4F46E5; }
    .menu-btn .arrow {
      transition: transform 0.2s;
      font-size: 10px;
    }
    .menu-btn.active .arrow { transform: rotate(180deg); }
    .menu-btn .preview {
      display: block;
      font-weight: 400;
      font-size: 11px;
      color: #9ca3af;
      margin-top: 2px;
    }
    .style-dropdown {
      display: none;
      background: white;
      border: 1.5px solid #e0e7ff;
      border-radius: 8px;
      margin-bottom: 16px;
      overflow: hidden;
    }
    .style-dropdown.open { display: block; }
    .dropdown-item {
      display: block;
      width: 100%;
      padding: 10px 14px;
      border: none;
      border-bottom: 1px solid #f0f0f0;
      background: white;
      color: #374151;
      font-size: 12px;
      text-align: left;
      cursor: pointer;
    }
    .dropdown-item:last-child { border-bottom: none; }
    .dropdown-item:hover { background: #eef2ff; color: #4F46E5; }
    .dropdown-section {
      padding: 6px 14px;
      background: #f8f9fa;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      color: #6c757d;
      letter-spacing: 0.05em;
    }
    .divider { border: none; border-top: 1px solid #e9ecef; margin: 16px 0; }
    #status {
      font-size: 12px;
      color: #6366f1;
      margin-top: 12px;
      min-height: 18px;
      text-align: center;
    }
    .loading {
      padding: 10px 14px;
      font-size: 12px;
      color: #6c757d;
      text-align: center;
    }
  </style>
</head>
<body>
  <h2>🎨 Rachele Tools</h2>

  <div class="section-title">Headings</div>
  <button class="menu-btn" onclick="applyStyle('Heading 1')">Heading 1</button>
  <button class="menu-btn" onclick="applyStyle('Heading 2')">Heading 2</button>
  <button class="menu-btn" onclick="applyStyle('Heading 3')">Heading 3</button>
  <button class="menu-btn" onclick="applyStyle('Normal')">Body Text</button>

  <hr class="divider" />

  <div class="section-title">Insert</div>
  <button class="menu-btn" onclick="insertLandscapePage()">
    Landscape Page <span class="preview">Insert landscape-oriented page</span>
  </button>

  <hr class="divider" />

  <div class="section-title">Tables</div>
  <button class="menu-btn" onclick="insertTable()">
    Insert Table <span class="preview">Insert 4x3 formatted table</span>
  </button>

  <p id="status"></p>
</body>
</html>
